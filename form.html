<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Анализ — Светолада</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(
          circle at 50% 50%,
          #0b0c10 0%,
          #000000 100%
        );
        color: #ffffff;
        text-align: center;
        overflow-x: hidden;
      }

      .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 200%;
        height: 200%;
        background: url("background.png") repeat;
        background-size: cover;
        animation: moveStars 40s linear infinite;
        z-index: -1;
      }

      @keyframes moveStars {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(-50%, 0);
        }
      }

      h2 {
        margin-top: 30px;
        color: #ffd700;
        text-shadow: 0 0 12px #ffd700;
        font-size: 38px;
      }

      form {
        width: 90%;
        max-width: 500px;
        margin: 30px auto;
        text-align: left;
        font-size: 20px;
      }

      label {
        display: block;
        margin-top: 20px;
        margin-bottom: 8px;
        font-size: 22px;
        color: #ffe680;
        text-shadow: 0 0 8px rgba(255, 230, 128, 1);
      }

      input,
      select {
        width: 100%;
        padding: 14px;
        font-size: 20px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.15);
        color: #ffffff;
        box-shadow: 0 0 12px rgba(120, 200, 255, 0.4);
        backdrop-filter: blur(4px);
      }

      input[type="radio"] {
        width: auto;
        transform: scale(1.5);
        margin-right: 10px;
      }

      .radio-block {
        margin-top: 15px;
        padding: 15px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 10px rgba(120, 200, 255, 0.3);
      }

      .submit-btn {
        margin-top: 30px;
        width: 100%;
        padding: 18px;
        font-size: 24px;
        border-radius: 12px;
        border: none;
        background: #4aa3ff;
        color: white;
        cursor: pointer;
        box-shadow: 0 0 18px rgba(80, 180, 255, 0.8);
        transition: 0.3s;
      }

      .submit-btn:hover {
        background: #6bb8ff;
        box-shadow: 0 0 28px rgba(120, 200, 255, 1);
      }

      footer {
        margin-top: 50px;
        padding: 15px;
        font-size: 18px;
        color: #ffe680;
        text-shadow: 0 0 8px rgba(255, 230, 128, 1);
      }
    </style>

    <script>
      function updateTimeFields() {
        const exact = document.getElementById("time_exact");
        const approx = document.getElementById("time_approx");
        const unknown = document.getElementById("time_unknown");

        document.getElementById("exact_time_input").style.display =
          exact.checked ? "block" : "none";

        document.getElementById("approx_time_select").style.display =
          approx.checked ? "block" : "none";
      }
    </script>
  </head>

  <body>
    <div class="stars"></div>

    <h2>Введите ваши данные</h2>

    <form action="result.html" method="GET">
      <label>Ваше имя</label>
      <input type="text" name="name" required />

      <label>Дата рождения</label>
      <input type="date" name="birthdate" required />

      <label>Время рождения</label>

      <div class="radio-block">
        <div>
          <input
            type="radio"
            name="time_mode"
            id="time_exact"
            value="exact"
            onclick="updateTimeFields()"
          />
          <label for="time_exact" style="display: inline">Точное время</label>
        </div>

        <div id="exact_time_input" style="display: none; margin-top: 10px">
          <input type="time" name="birthtime" />
        </div>

        <div style="margin-top: 15px">
          <input
            type="radio"
            name="time_mode"
            id="time_approx"
            value="approx"
            onclick="updateTimeFields()"
          />
          <label for="time_approx" style="display: inline"
            >Примерное время рождения</label
          >
        </div>

        <div id="approx_time_select" style="display: none; margin-top: 10px">
          <select name="birthtime_range">
            <option value="morning">Утро (06:00–11:59)</option>
            <option value="day">День (12:00–17:59)</option>
            <option value="evening">Вечер (18:00–22:59)</option>
            <option value="night">Ночь (23:00–05:59)</option>
          </select>
        </div>

        <div style="margin-top: 15px">
          <input
            type="radio"
            name="time_mode"
            id="time_unknown"
            value="unknown"
            onclick="updateTimeFields()"
          />
          <label for="time_unknown" style="display: inline"
            >Не знаю время</label
          >
        </div>
      </div>

      <label>Пол</label>
      <select name="gender">
        <option value="female">Женщина</option>
        <option value="male">Мужчина</option>
      </select>

      <button class="submit-btn">Продолжить</button>
    </form>

    <footer>
      Проект создан Людмилой в партнёрстве с ИИ Copilot. 01.07.2026
    </footer>
  </body>
</html>
