<div class="form-box">
  <form action="result.html" method="GET">
    <!-- ДАННЫЕ ПОЛЬЗОВАТЕЛЯ -->
    <h2 style="color: #ffd700; text-shadow: 0 0 8px #ffd700; margin-top: 0">
      Ваши данные ✨
    </h2>

    <label>Ваше имя</label>
    <input type="text" name="name" required />

    <label>Дата рождения</label>
    <input type="date" name="birthdate" required />

    <label>Пол</label>
    <select name="gender" required>
      <option value="">Выберите…</option>
      <option value="female">Женский</option>
      <option value="male">Мужской</option>
    </select>

    <label>Место рождения (необязательно)</label>
    <input type="text" name="birthplace" placeholder="Город, страна" />

    <label>Время рождения (необязательно)</label>
    <select name="birthtime">
      <option value="">Не знаю / не указано</option>
      <option value="morning">Утро</option>
      <option value="day">День</option>
      <option value="evening">Вечер</option>
      <option value="night">Ночь</option>
    </select>

    <!-- ДАННЫЕ ПАРТНЁРА -->
    <h2 style="color: #ffd700; text-shadow: 0 0 8px #ffd700; margin-top: 40px">
      Данные партнёра (необязательно) 💛
    </h2>

    <label>Имя партнёра</label>
    <input type="text" name="partner_name" placeholder="Можно не указывать" />

    <label>Дата рождения партнёра</label>
    <input type="date" name="partner_birthdate" />

    <label>Пол партнёра</label>
    <select name="partner_gender">
      <option value="">Не указано</option>
      <option value="female">Женский</option>
      <option value="male">Мужской</option>
    </select>

    <p
      style="
        margin-top: 10px;
        font-size: 16px;
        color: #ffe680;
        text-shadow: 0 0 6px #ffe680;
      "
    >
      Если вы не укажете данные партнёра, Светолада создаст портрет вашего
      идеального партнёра ✨
    </p>

    <button type="submit">Получить анализ</button>
  </form>
</div>
