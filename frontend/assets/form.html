<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Светолада — Персональный анализ</title>

    <link rel="stylesheet" href="../styles/style.css" />

    <style>
      .form-container {
        max-width: 700px;
        margin: 60px auto;
        background: rgba(255, 255, 255, 0.85);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.1);
        animation: fadeIn 0.8s ease;
      }

      .form-container h2 {
        text-align: center;
        color: #b89c6a;
        font-size: 32px;
        margin-bottom: 25px;
      }

      label {
        display: block;
        margin-top: 20px;
        font-size: 18px;
        color: #5a4a3a;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        border-radius: 8px;
        border: 1px solid #d2c7b8;
        font-size: 16px;
      }

      .submit-btn {
        margin-top: 30px;
        width: 100%;
        padding: 14px;
        background: #b89c6a;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 20px;
        cursor: pointer;
        transition: 0.3s;
      }

      .submit-btn:hover {
        background: #a88a58;
        transform: translateY(-2px);
      }
    </style>
  </head>

  <body>
    <div class="svetolada-logo">Светолада ✨</div>

    <div class="form-container">
      <h2>Персональный анализ</h2>

      <form id="svetolada-form">
        <label>Ваше имя</label>
        <input type="text" name="name" required />

        <label>Дата рождения</label>
        <input type="date" name="birthdate" required />

        <label>Точное время рождения (чч:мм)</label>
        <input type="time" name="birthtime_exact" />

        <label>Период рождения</label>
        <select name="birthtime_period">
          <option value="">Не знаю</option>
          <option value="morning">Утро</option>
          <option value="day">День</option>
          <option value="evening">Вечер</option>
          <option value="night">Ночь</option>
        </select>

        <label>Город рождения</label>
        <input type="text" name="birthplace" />

        <label>Дата рождения партнёра (дд.мм.гггг)</label>
        <input type="text" name="partner_birthdate" placeholder="дд.мм.гггг" />

        <button class="submit-btn">Получить анализ</button>
      </form>
    </div>

    <script src="../js/form.js"></script>
  </body>
</html>
