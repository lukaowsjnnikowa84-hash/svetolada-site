<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Советы на каждый день</title>

    <!-- Стили -->
    <link rel="stylesheet" href="../css/daily_tips.css" />

    <!-- Логика -->
    <script src="../js/daily_tips.js" defer></script>
  </head>
  <body>
    <div class="daily-tips-page">
      <h1 class="page-title">Советы на каждый день</h1>

      <section class="main-tip-block">
        <h2>Совет дня</h2>
        <p id="main-tip">Здесь будет отображаться главный совет дня.</p>
        <button id="new-tip-btn">Хочу другой совет</button>
      </section>

      <section class="categories-section">
        <h2>Мини‑советы по категориям</h2>

        <div class="category-block">
          <h3>Здоровье</h3>
          <ul id="health-tips-list"></ul>
        </div>

        <div class="category-block">
          <h3>Эмоции</h3>
          <ul id="emotion-tips-list"></ul>
        </div>

        <div class="category-block">
          <h3>Отношения</h3>
          <ul id="relationship-tips-list"></ul>
        </div>

        <div class="category-block">
          <h3>Дом</h3>
          <ul id="home-tips-list"></ul>
        </div>

        <div class="category-block">
          <h3>Работа</h3>
          <ul id="work-tips-list"></ul>
        </div>

        <div class="category-block">
          <h3>Энергия и настроение</h3>
          <ul id="energy-tips-list"></ul>
        </div>
      </section>

      <section class="archive-section">
        <h2>Архив советов</h2>
        <ul id="archive-list"></ul>
      </section>
    </div>
  </body>
</html>
