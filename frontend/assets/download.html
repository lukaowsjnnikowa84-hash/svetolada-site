<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Светолада — Скачивание PDF</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        background: #f7f3ed;
        font-family: "Inter", sans-serif;
        color: #4a4a4a;
        text-align: center;
      }

      .container {
        margin-top: 140px;
      }

      h2 {
        font-family: "Playfair Display", serif;
        font-size: 30px;
        color: #b89c6a;
        margin-bottom: 30px;
      }

      .progress-bar {
        width: 60%;
        height: 14px;
        background: #e8e0d4;
        border-radius: 10px;
        margin: 0 auto;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #b89c6a, #d8c7a3);
        border-radius: 10px;
        animation: loading 3s ease-in-out forwards;
      }

      @keyframes loading {
        from {
          width: 0%;
        }
        to {
          width: 100%;
        }
      }

      .text {
        margin-top: 30px;
        font-size: 18px;
        color: #6a6a6a;
      }

      .download-btn {
        margin-top: 40px;
        background-color: #b89c6a;
        color: white;
        padding: 16px 32px;
        border: none;
        border-radius: 8px;
        font-size: 20px;
        cursor: pointer;
        font-family: "Inter", sans-serif;
      }

      footer {
        text-align: center;
        margin-top: 100px;
        font-size: 14px;
        color: #a89f90;
        padding-bottom: 40px;
      }
    </style>

    <script>
      // Появление кнопки после загрузки
      setTimeout(function () {
        document.getElementById("download-btn").style.display = "inline-block";
      }, 3200);
    </script>
  </head>

  <body>
    <div class="container">
      <h2>Ваш PDF готов</h2>

      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>

      <div class="text">
        Подготовка завершена.<br />
        Вы можете скачать ваш персональный отчёт.
      </div>

      <button
        id="download-btn"
        class="download-btn"
        style="display: none"
        onclick="window.location.href = 'pdf/your_report.pdf'"
      >
        Скачать PDF
      </button>
    </div>

    <footer>
      Светолада © 2026<br />
      Безопасность данных гарантирована.<br />
      Разработано с заботой и светом.
    </footer>
  </body>
</html>
