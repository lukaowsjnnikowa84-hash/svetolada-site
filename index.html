<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Светолада</title>

  <!-- Иконка для вкладки браузера -->
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: radial-gradient(circle at 50% 50%, #0b0c10 0%, #000000 100%);
      overflow: hidden;
      color: #f7f2e9;
      text-align: center;
    }

    /* Всплывающий заголовок */
    h1 {
      margin-top: 50px;
      font-size: 60px;
      color: #ffd700;
      text-shadow:
        0 0 10px #ffd700,
        0 0 20px #ffec8b,
        0 0 30px #fffacd;
      animation: glow 3s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 10px #ffd700,
          0 0 20px #ffec8b,
          0 0 30px #fffacd;
      }
      to {
        text-shadow:
          0 0 20px #ffd700,
          0 0 40px #ffec8b,
          0 0 60px #fffacd;
      }
    }

    /* Крупное слово "Светолада" */
    .brand {
      margin-top: 10px;
      font-size: 48px;
      font-weight: 600;
      color: #ffd700;
      text-shadow:
        0 0 10px #ffd700,
        0 0 20px #ffec8b;
    }

    /* Крупная голубая кнопка */
    a {
      display: inline-block;
      margin-top: 30px;
      padding: 18px 36px;
      font-size: 24px;
      font-weight: 600;
      background: #4a90e2;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      box-shadow:
        0 0 12px #4a90e2,
        0 0 25px #4a90e2;
      transition: 0.3s;
    }

    a:hover {
      background: #357ab8;
      box-shadow:
        0 0 20px #4a90e2,
        0 0 40px #4a90e2;
    }

    /* Движущиеся звёзды */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      background: url("background.png") repeat;
      background-size: cover;
      animation: moveStars 60s linear infinite;
      z-index: -1;
    }

    @keyframes moveStars {
      from { transform: translate(0, 0); }
      to { transform: translate(-50%, -50%); }
    }
  </style>
</head>
<script>
document.addEventListener("DOMContentLoaded", () => {
  // ищем заголовок с текстом "Добро пожаловать в Светоладу"
  const heading = document.querySelector("h1");
  if (heading && heading.textContent.includes("Светоладу")) {
    heading.textContent = "Добро пожаловать ✨";
  }

  // удаляем голубую кнопку, если она есть
  const button = document.querySelector("a");
  if (button && button.textContent.includes("Создать")) {
    button.remove();
  }
});
</script>


<body>
  <div class="stars"></div>

  <h1>Светолада ✨</h1>
  
  <a href="#">Сделать персональный анализ</a>
</body>
</html>
