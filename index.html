<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Светолада — Главная</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(
          circle at 50% 50%,
          #0b0c10 0%,
          #000000 100%
        );
        color: #ffffff;
        text-align: center;
        overflow-x: hidden;
      }

      .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 200%;
        height: 200%;
        background: url("background.png") repeat;
        background-size: cover;
        animation: moveStars 60s linear infinite;
        z-index: -1;
      }

      @keyframes moveStars {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(-50%, -50%);
        }
      }

      img.logo {
        width: 160px;
        margin-top: 50px;
        filter: drop-shadow(0 0 14px #ffd700);
      }

      /* Заголовок */
      h1.title {
        font-size: 64px;
        margin-top: 40px;
        color: #ffffff;
        text-shadow:
          0 0 14px rgba(255, 255, 255, 0.9),
          0 0 28px rgba(120, 180, 255, 0.7);
        letter-spacing: 2px;
      }

      /* Кнопка */
      .main-button {
        display: inline-block;
        margin-top: 35px;
        padding: 18px 40px;
        font-size: 26px;
        color: #ffffff;
        background: linear-gradient(90deg, #5aa9f4, #7bc4ff);
        border-radius: 12px;
        text-decoration: none;
        box-shadow: 0 0 18px rgba(90, 169, 244, 0.8);
        transition: 0.3s;
      }

      .main-button:hover {
        box-shadow: 0 0 28px rgba(120, 200, 255, 1);
        transform: scale(1.05);
      }

      /* Меню */
      nav.menu {
        margin-top: 25px;
      }

      nav.menu a {
        color: #ffd700;
        margin: 0 18px;
        text-decoration: none;
        font-size: 24px;
        text-shadow: 0 0 8px #ffd700;
      }

      /* Футер */
      footer {
        margin-top: 80px;
        padding: 15px;
        font-size: 16px;
        color: #ffd700;
        opacity: 0.8;
      }

      footer a {
        color: #ffd700;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div class="stars"></div>

    <img src="icon.png" alt="Логотип Светолада" class="logo" />

    <h1 class="title">Светолада ✨</h1>

    <a href="form.html" class="main-button">Сделать персональный анализ</a>

    <nav class="menu">
      <a href="index.html">🏠 Главная</a>
      <a href="form.html">✨ Анализ</a>
      <a href="about.html">🌿 О Светоладе</a>
    </nav>

    <footer>
      <a href="privacy.html">Безопасность</a> | © Светолада, 2026 | версия
      <span id="update-date"></span>
    </footer>

    <script>
      document.getElementById("update-date").textContent =
        new Date().toLocaleDateString("ru-RU");
    </script>
  </body>
</html>
