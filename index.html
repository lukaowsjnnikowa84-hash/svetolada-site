<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Светолада — Персональный анализ</title>

    <link rel="stylesheet" href="/frontend/styles/style.css" />

    <style>
      .hero {
        text-align: center;
        margin-top: 140px;
        animation: fadeIn 1.2s ease;
      }

      .hero-text {
        font-size: 26px;
        color: #3a2f28;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        margin-top: 20px;
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.6;
      }

      .start-btn {
        margin-top: 40px;
        padding: 18px 42px;
        background: #b89c6a;
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 0 22px rgba(184, 156, 106, 0.8);
        transition: 0.3s;
      }

      .start-btn:hover {
        background: #a88a58;
        box-shadow: 0 0 32px rgba(184, 156, 106, 1);
        transform: translateY(-3px);
      }
    </style>
  </head>

  <body>
    <div class="svetolada-logo">Светолада ✨</div>

    <div class="hero">
      <div class="hero-text">
        Персональный анализ вибраций, пути души, предназначения и энергии
        рождения.<br />
        Мягкое путешествие внутрь себя — через числа, архетипы и свет.
      </div>

      <button
        class="start-btn"
        onclick="location.href = '/frontend/assets/form.html'"
      >
        Начать анализ
      </button>
    </div>
  </body>
</html>
