<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Светолада — Главная</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(
          circle at 50% 50%,
          #0b0c10 0%,
          #000000 100%
        );
        color: #f7f2e9;
        text-align: center;
        overflow-x: hidden;
      }

      .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 200%;
        height: 200%;
        background: url("background.png") repeat;
        background-size: cover;
        animation: moveStars 60s linear infinite;
        z-index: -1;
      }

      @keyframes moveStars {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(-50%, -50%);
        }
      }

      img.logo {
        width: 140px;
        margin-top: 40px;
        filter: drop-shadow(0 0 12px #ffd700);
      }

      /* Обычное меню */
      nav.menu {
        margin-top: 25px;
      }

      nav.menu a {
        color: #ffd700;
        margin: 0 18px;
        text-decoration: none;
        font-size: 24px;
        text-shadow: 0 0 8px #ffd700;
      }

      /* Футер */
      footer {
        margin-top: 60px;
        padding: 15px;
        font-size: 16px;
        color: #ffd700;
        opacity: 0.8;
      }

      footer a {
        color: #ffd700;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div class="stars"></div>

    <img src="icon.png" alt="Логотип Светолада" class="logo" />

    <!-- Обычное меню -->
    <nav class="menu">
      <a href="index.html">🏠 Главная</a>
      <a href="form.html">✨ Анализ</a>
      <a href="about.html">🌿 О Светоладе</a>
    </nav>

    <!-- Футер -->
    <footer>
      <a href="privacy.html">Безопасность</a> | © Светолада, 2026 | версия
      <span id="update-date"></span>
    </footer>

    <script>
      document.getElementById("update-date").textContent =
        new Date().toLocaleDateString("ru-RU");
    </script>
  </body>
</html>
